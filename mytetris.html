<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TETRIS</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <style>
            *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

            body{
                background:#060c06;
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
                font-family:'Press Start 2P','Courier New',monospace;
                color:#33ff33;
                overflow:hidden;
            }

            /* CRT lines */
            body::before{
                content:'';
                position:fixed;inset:0;
                background:repeating-linear-gradient(
                to bottom,
                transparent 0px,transparent 3px,
                rgba(0,0,0,0.25) 3px,rgba(0,0,0,0.25) 4px
                );
                pointer-events:none;z-index:200;
            }

            /* creates the vignette-like tunnel vision */
            body::after{
                content:'';
                position:fixed;inset:0;
                background: radial-gradient(
                    ellipse at center, 
                    transparent 25%,
                    rgba(0,0,0,0.80) 100%
                 );
                pointer-events:none;
                z-index:199;
            }
            
            /*objects in the wrapper*/
            #wrapper{
                display:flex;
                align-items:flex-start;
                gap:50px;
                padding:16px;
            }
            
            /* main board */
            #board-wrap{
                position:relative;
                border:10px solid #1c6e1c;
                box-shadow:
                0 0 0 1px #0a350a,
                0 0 18px rgba(51,255,51,0.35),
                0 0 50px rgba(51,255,51,0.08),
                inset 0 0 18px rgba(0,0,0,0.6);
            }

            /* the image-rendering:pixelated makes the pixels more pixel-y, doesn't smooth them*/ 
            #board{
                display:block;
                image-rendering:pixelated;
                background:#020902;
            }



        </style>
    </head>
    <body>

    </body>
</html>
