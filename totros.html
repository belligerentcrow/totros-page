<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TETRIS</title>
        <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
        <link href="./style/tetris.css" rel="stylesheet">
        
        <link rel="icon" href="./style/gamepad.png">
    </head>
    <body>

        <!-- Main Menu -->
        <div class="ov" id="ov-menu">
            <div class="pop">
                <div class="pop-title">TETRIS</div>
                <div id="random-quote" style="font-size:10px;color:#ffff00;text-align:center;margin-bottom:14px;text-shadow: 0 0 5px #ffff00;"></div>
                <button class="btn" id="b-start">▶  START GAME</button>
                <button class="btn" id="b-hs">HIGH SCORES</button>
                <button class="btn" id="b-ctrl">CONTROLS</button>
                <button class="btn blue" id="toIndex">BACK TO CROW'S MAIN PAGE</button>
            </div>
        </div>

        <!-- Pause menu -->
        <div class="ov hidden" id="ov-pause">
            <div class="pop">
                <div class="pop-title">PAUSED</div>
                <button class="btn" id="b-resume">▶  RESUME</button>
                <button class="btn" id="b-ctrl2">CONTROLS</button>
                <button class="btn red" id="b-quit">QUIT TO MENU</button>
            </div>
        </div>

        <!-- Game over menu -->
        <div class="ov hidden" id="ov-gameover">
            <div class="pop">
                <div class="pop-title">GAME OVER</div>
                <div class="sub-label">SCORE</div>
                <div class="big-score" id="go-score">0</div>
                <div class="sub-label" style="margin-bottom: 14px;">LEVEL <span id="go-lv">1</span>&nbsp;·&nbsp;<span id="go-ln">0</span> LINES</div>
                <div id="hs-entry" style="display: none;">
                    <div class="hs-notice"> !! NEW HIGH SCORE !!</div>
                    <div style="font-size:8px;color:#1a7a1a;margin-bottom:3px">ENTER NAME (MAX 10 CHARS):</div>
                    <input type="text" id="name-inp" maxlength="10" placeholder="PLAYER"
                    spellcheck="false" autocomplete="off"><br>
                    <button class="btn" id="b-submit" style="width:auto;display:inline-block;padding:8px 18px;margin-bottom:10px">SUBMIT</button>
                </div>
                <button class="btn" id="b-retry">▶  PLAY AGAIN</button>
                <button class="btn" id="b-gomenu">MAIN MENU</button>

            </div>
        </div>

        <!-- High Scores menu and table -->
        <div class="ov hidden" id="ov-hs">
            <div class="pop">
                <div class="pop-title" style="font-size:16px">HIGH SCORES</div>
                <div class="scroll">
                    <table class="hs-tbl">
                    <thead><tr><th>#</th><th>NAME</th><th>SCORE</th><th>LV</th><th>LINES</th></tr></thead>
                        <tbody id="hs-body"></tbody>
                    </table>
                </div>
            <button class="btn red sm" id="b-hs-clear">CLEAR ALL SCORES</button>
            <button class="btn" id="b-hs-back">BACK</button>
            </div>
        </div>

        <!-- Controls menu -->
        <div class="ov hidden" id="ov-ctrl">
            <div class="pop">
                <div class="pop-title" style="font-size:15px">CONTROLS</div>
                <div class="scroll">
                    <table class="ctrl-tbl" id="ctrl-tbl"></table>
                </div>
                <button class="btn sm" id="b-ctrl-reset">RESET TO DEFAULTS</button>
                <button class="btn" id="b-ctrl-back">SAVE &amp; BACK</button>
            </div>
        </div>

        <!-- ACTUAL GAME INTERFACE -->
        <div id="wrapper">
            <!-- Left Panel with Hold Score and Best Score-->
            <div class="panel">
                <div class="box"> <div class="label">HOLD</div><canvas class="mini" id="c-hold" width="80" height="64"></canvas></div>
                <div class="box"> <div class="label">SCORE</div><div class="score" id="ui-score">0</div></div>
                <div class="box"> <div class="label">BEST</div> <div class="score" id="ui-best" style="color:#ffff00;text-shadow: 0 0 7px #ffff00;">0</div></div>
            </div>

            <!-- Main Game Board -->
            <div id="board-wrap">
                <canvas id="board" width="300" height="600"></canvas>
            </div>

            <div class="panel">
                <div class="box"> <div class="label">NEXT</div><canvas class="mini" id="c-next" width="80" height="64"></canvas></div>
                <div class="box"><div class="label">LEVEL</div><div class="score" id="ui-level">1</div></div>
                <div class="box"> <div class="label">LINES</div> <div class="score" id="ui-lines">0</div></div>
                <div class="box" style="font-size:8px;color:#0d420d;line-height:2">
                    <div style="color:#1a7a1a;margin-bottom:3px;letter-spacing:1px">KEYS</div>
                    <div>PAUSE: ESC</div>
                    <div>HOLD: C</div>
                    <div>HARD DROP: SPC</div>
                </div>
            </div>
        </div>

        <!-- Script -->
        <script src="./script/tetris.js"></script>

    </body>
</html>
